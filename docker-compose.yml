version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-alquila
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: alquilatusvehiculos
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: app-alquila
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/alquilatusvehiculos?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

volumes:
  mysql_data: